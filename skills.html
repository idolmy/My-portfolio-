<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills - Ineza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background:
                linear-gradient(
                    rgba(10,15,40,.35),
                    rgba(10,15,40,.55)
                ),
                url("4709159.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            margin-top: 70px;
        }

        /* ===== CYBERPUNK NAVIGATION BAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 0, 51, 0.95) 50%, rgba(10, 14, 39, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), inset 0 1px 0 rgba(212, 0, 255, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: bold;
            color: #00f5ff;
            text-shadow: 0 0 10px #00f5ff, 0 0 20px #a020f0;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .navbar-logo:hover {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 30px #00f5ff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: #00f5ff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 12px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #d400ff);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .nav-link:hover {
            color: #d400ff;
            text-shadow: 0 0 10px #d400ff, 0 0 20px #00f5ff;
        }

        .nav-link:hover::before {
            width: 100%;
        }

        .nav-link.active {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 25px #00f5ff;
            border-bottom: 2px solid #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.6) inset;
        }

        .nav-link.active::before {
            width: 100%;
            background: linear-gradient(90deg, #d400ff, #00f5ff);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #00f5ff;
            border-radius: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ===== SKILLS PAGE STYLING ===== */
        h1 {
            color: #00f5ff;
            font-size: 3em;
            margin-bottom: 60px;
            text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff, 0 0 60px #7c3aed;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: neonFlicker 3s infinite;
        }

        @keyframes neonFlicker {
            0%, 100% {
                text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff, 0 0 60px #7c3aed;
            }
            50% {
                text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff, 0 0 40px #7c3aed;
            }
        }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        .skill-card {
            background: linear-gradient(135deg, rgba(5, 8, 22, 0.8) 0%, rgba(18, 0, 36, 0.8) 100%);
            border: 2px solid #00f5ff;
            border-radius: 15px;
            padding: 30px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), 0 0 40px rgba(124, 58, 237, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1) 0%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% {
                transform: translate(-100%, -100%);
            }
            100% {
                transform: translate(100%, 100%);
            }
        }

        .skill-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5), 0 0 60px rgba(124, 58, 237, 0.4), inset 0 0 30px rgba(0, 245, 255, 0.1);
            border-color: #b24bff;
        }

        .skill-name {
            color: #00f5ff;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f5ff;
        }

        .skill-percentage {
            color: #b24bff;
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #b24bff;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(0, 245, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 245, 255, 0.2);
            position: relative;
            z-index: 2;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #00f5ff 0%, #b24bff 100%);
            box-shadow: 0 0 15px #00f5ff, 0 0 25px #b24bff, inset 0 0 10px rgba(255, 255, 255, 0.3);
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .skill-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #00f5ff;
        }

        .skill-value {
            color: #b24bff;
            font-weight: bold;
        }

        /* ===== RESPONSIVE DESIGN (Mobile & Tablet) ===== */
        @media (max-width: 768px) {
            .navbar {
                height: 60px;
                padding: 0 20px;
            }

            .navbar-logo {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .hamburger {
                display: flex;
            }

            .nav-menu {
                position: absolute;
                left: 0;
                top: 60px;
                flex-direction: column;
                width: 100%;
                text-align: center;
                background: linear-gradient(180deg, rgba(10, 14, 39, 0.98) 0%, rgba(26, 0, 51, 0.98) 100%);
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                border-bottom: 2px solid #00f5ff;
                box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2);
            }

            .nav-menu.active {
                max-height: 300px;
            }

            .nav-link {
                width: 100%;
                padding: 18px 20px;
                border-bottom: 1px solid rgba(0, 245, 255, 0.2);
                font-size: 13px;
            }

            .nav-link::before {
                display: none;
            }

            .nav-link:hover {
                background: rgba(0, 245, 255, 0.1);
                border-left: 4px solid #d400ff;
                padding-left: 16px;
            }

            .nav-link.active {
                background: rgba(212, 0, 255, 0.2);
                border-left: 4px solid #d400ff;
                border-bottom: 1px solid #d400ff;
                padding-left: 16px;
            }

            body {
                margin-top: 60px;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 40px;
            }

            .skills-container {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 30px;
            }

            .skill-card {
                padding: 25px;
            }

            .skill-name {
                font-size: 1.3em;
            }

            .skill-percentage {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                height: 55px;
                padding: 0 15px;
            }

            .navbar-logo {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .nav-link {
                font-size: 12px;
            }

            .nav-menu.active {
                max-height: 280px;
            }

            body {
                margin-top: 55px;
                padding: 20px 10px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 30px;
            }

            .skills-container {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .skill-card {
                padding: 20px;
            }

            .skill-name {
                font-size: 1.2em;
            }

            .skill-percentage {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="navbar-logo">INEZA</div>

        <ul class="nav-menu">
            <li><a href="about.html" class="nav-link" data-page="about">About</a></li>
            <li><a href="projects.html" class="nav-link" data-page="projects">Projects</a></li>
            <li><a href="hobbies.html" class="nav-link" data-page="hobbies">Hobbies</a></li>
            <li><a href="skills.html" class="nav-link active" data-page="skills">Skills</a></li>
            <li><a href="contact.html" class="nav-link" data-page="contacts">Contacts</a></li>
        </ul>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <h1>SKILLS</h1>

    <div class="skills-container">
        <div class="skill-card">
            <div class="skill-name">HTML</div>
            <div class="skill-percentage">80%</div>
            <div class="skill-label">
                <span>Proficiency</span>
                <span class="skill-value">80%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 80%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <div class="skill-name">CSS</div>
            <div class="skill-percentage">60%</div>
            <div class="skill-label">
                <span>Proficiency</span>
                <span class="skill-value">60%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 60%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <div class="skill-name">JavaScript</div>
            <div class="skill-percentage">50%</div>
            <div class="skill-label">
                <span>Proficiency</span>
                <span class="skill-value">50%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 50%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <div class="skill-name">Python</div>
            <div class="skill-percentage">5%</div>
            <div class="skill-label">
                <span>Proficiency</span>
                <span class="skill-value">5%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 5%;"></div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION SCRIPT -->
    <script>
        // ===== HAMBURGER MENU TOGGLE =====
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const navLinks = document.querySelectorAll('.nav-link');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Close menu when a link is clicked
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // ===== ACTIVE PAGE HIGHLIGHTING =====
        function setActivePage() {
            const currentPage = window.location.pathname.split('/').pop() || 'about.html';
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                
                if (href === currentPage || (currentPage === '' && href === 'about.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        // Set active page on page load
        document.addEventListener('DOMContentLoaded', setActivePage);
        
        // Update active page on route change
        window.addEventListener('popstate', setActivePage);
    </script>
</body>
</html>
