<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Ineza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: rgb(255, 255, 255);
            font-family: 'Courier New', monospace;
            background:
                linear-gradient(
                    rgba(10,15,40,.35),
                    rgba(10,15,40,.55)
                ),
                url("4709159.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            margin-top: 70px;
        }

        /* ===== CYBERPUNK NAVIGATION BAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 0, 51, 0.95) 50%, rgba(10, 14, 39, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), inset 0 1px 0 rgba(212, 0, 255, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: bold;
            color: #00f5ff;
            text-shadow: 0 0 10px #00f5ff, 0 0 20px #a020f0;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .navbar-logo:hover {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 30px #00f5ff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: #00f5ff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 12px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #d400ff);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .nav-link:hover {
            color: #d400ff;
            text-shadow: 0 0 10px #d400ff, 0 0 20px #00f5ff;
        }

        .nav-link:hover::before {
            width: 100%;
        }

        .nav-link.active {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 25px #00f5ff;
            border-bottom: 2px solid #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.6) inset;
        }

        .nav-link.active::before {
            width: 100%;
            background: linear-gradient(90deg, #d400ff, #00f5ff);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #00f5ff;
            border-radius: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ===== PROJECTS PAGE STYLING ===== */
        .projects {
            width: 90%;
            margin: auto;
            padding: 50px 0;
        }

        h1 {
            text-align: center;
            color: #00f5ff;
            text-shadow: 0 0 15px #00f5ff;
            font-size: 3em;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .hero-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }

        .image-panel {
            border: 2px solid #00f5ff;
            padding: 10px;
            box-shadow: 0 0 20px #00f5ff;
            background: linear-gradient(
                135deg,
                #050816,
                #120024,
                #041c32
            );
        }

        .image-panel img {
            width: 100%;
            display: block;
        }

        .info-panel {
            border: 2px solid #a020f0;
            padding: 30px;
            box-shadow: 0 0 20px #a020f0;
            background: linear-gradient(
                135deg,
                #050816,
                #120024,
                #041c32
            );
        }

        .tag {
            color: #00f5ff;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        #projectTitle {
            color: #00f5ff;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.8);
            letter-spacing: 2px;
        }

        #projectDescription {
            color: #c0c0c0;
            font-size: 1.1em;
            line-height: 1.8;
        }

        .selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .selector button {
            background: linear-gradient(
                135deg,
                #050816,
                #120024,
                #041c32
            );
            border: 2px solid #00f5ff;
            color: #00f5ff;
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        .selector button:hover {
            background: linear-gradient(135deg, #00f5ff, #d400ff);
            color: #050816;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.6), 0 0 50px rgba(212, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        .selector button:active {
            transform: translateY(0);
        }

        /* ===== RESPONSIVE DESIGN (Mobile & Tablet) ===== */
        @media (max-width: 768px) {
            .navbar {
                height: 60px;
                padding: 0 20px;
            }

            .navbar-logo {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .hamburger {
                display: flex;
            }

            .nav-menu {
                position: absolute;
                left: 0;
                top: 60px;
                flex-direction: column;
                width: 100%;
                text-align: center;
                background: linear-gradient(180deg, rgba(10, 14, 39, 0.98) 0%, rgba(26, 0, 51, 0.98) 100%);
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                border-bottom: 2px solid #00f5ff;
                box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2);
            }

            .nav-menu.active {
                max-height: 300px;
            }

            .nav-link {
                width: 100%;
                padding: 18px 20px;
                border-bottom: 1px solid rgba(0, 245, 255, 0.2);
                font-size: 13px;
            }

            .nav-link::before {
                display: none;
            }

            .nav-link:hover {
                background: rgba(0, 245, 255, 0.1);
                border-left: 4px solid #d400ff;
                padding-left: 16px;
            }

            .nav-link.active {
                background: rgba(212, 0, 255, 0.2);
                border-left: 4px solid #d400ff;
                border-bottom: 1px solid #d400ff;
                padding-left: 16px;
            }

            body {
                margin-top: 60px;
            }

            .projects {
                width: 95%;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 30px;
            }

            .hero-panel {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .selector {
                gap: 10px;
            }

            .selector button {
                padding: 12px 20px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                height: 55px;
                padding: 0 15px;
            }

            .navbar-logo {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .nav-link {
                font-size: 12px;
            }

            .nav-menu.active {
                max-height: 280px;
            }

            body {
                margin-top: 55px;
            }

            .projects {
                width: 100%;
                padding: 30px 15px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 20px;
            }

            .hero-panel {
                gap: 15px;
            }

            .image-panel {
                padding: 8px;
            }

            .info-panel {
                padding: 20px;
            }

            #projectTitle {
                font-size: 1.8em;
                margin-bottom: 15px;
            }

            #projectDescription {
                font-size: 0.95em;
            }

            .selector {
                flex-direction: column;
                gap: 10px;
            }

            .selector button {
                width: 100%;
                padding: 12px 15px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="navbar-logo">INEZA</div>

        <ul class="nav-menu">
            <li><a href="about.html" class="nav-link" data-page="about">About</a></li>
            <li><a href="projects.html" class="nav-link active" data-page="projects">Projects</a></li>
            <li><a href="hobbies.html" class="nav-link" data-page="hobbies">Hobbies</a></li>
            <li><a href="skills.html" class="nav-link" data-page="skills">Skills</a></li>
            <li><a href="contact.html" class="nav-link" data-page="contacts">Contacts</a></li>
        </ul>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <section class="projects">
        <h1>PROJECTS</h1>

        <div class="hero-panel">
            <div class="image-panel">
                <img id="projectImage" src="Screenshot 2026-06-13 9.33.24 AM.png" alt="Project image">
            </div>

            <div class="info-panel">
                <p class="tag">FEATURED PROJECT //</p>
                <h2 id="projectTitle">LIGHT PROJECT</h2>
                <p id="projectDescription">Smart lighting project using sensors and LEDs.</p>
            </div>
        </div>

        <div class="selector">
            <button onclick="changeProject(0)">Cooling System</button>
            <button onclick="changeProject(1)">Light Project</button>
            <button onclick="changeProject(2)">Digital Map</button>
        </div>
    </section>

    <!-- NAVIGATION SCRIPT -->
    <script>
        const projects = [
            {
                title: "COOLING SYSTEM",
                image: "Screenshot 2026-06-13 9.31.19 AM.png",
                description: "Automatic cooling system using temperature sensors."
            },
            {
                title: "LIGHT PROJECT",
                image: "Screenshot 2026-06-13 9.33.24 AM.png",
                description: "Smart lighting project using sensors and LEDs."
            },
            {
                title: "DIGITAL MAP",
                image: "Screenshot 2026-06-13 9.42.00 AM.png",
                description: "Interactive digital mapping project."
            }
        ];

        function changeProject(index) {
            document.getElementById("projectImage").src = projects[index].image;
            document.getElementById("projectTitle").textContent = projects[index].title;
            document.getElementById("projectDescription").textContent = projects[index].description;
        }

        // ===== HAMBURGER MENU TOGGLE =====
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const navLinks = document.querySelectorAll('.nav-link');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Close menu when a link is clicked
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // ===== ACTIVE PAGE HIGHLIGHTING =====
        function setActivePage() {
            const currentPage = window.location.pathname.split('/').pop() || 'about.html';
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                
                if (href === currentPage || (currentPage === '' && href === 'about.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        // Set active page on page load
        document.addEventListener('DOMContentLoaded', setActivePage);
        
        // Update active page on route change
        window.addEventListener('popstate', setActivePage);
    </script>
</body>
</html>
