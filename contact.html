<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - Ineza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #050816 0%, #120024 50%, #041c32 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            margin-top: 70px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 0, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 800px;
        }

        .email-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .email-label {
            color: #00d4ff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .email-display {
            font-size: 28px;
            color: #00d4ff;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 20px 40px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.1),
                0 0 40px rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .email-display:hover {
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.5),
                inset 0 0 30px rgba(0, 212, 255, 0.15),
                0 0 60px rgba(0, 212, 255, 0.3);
            transform: scale(1.02);
        }

        .neon-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, #d400ff, transparent);
            margin: 40px 0;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(212, 0, 255, 0.3);
        }

        .form-container {
            background: rgba(5, 8, 22, 0.7);
            border: 2px solid;
            border-image: linear-gradient(135deg, #00d4ff, #d400ff) 1;
            border-radius: 12px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.2),
                0 0 60px rgba(212, 0, 255, 0.1),
                inset 0 0 30px rgba(0, 212, 255, 0.05);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            position: relative;
            z-index: 3;
        }

        .form-title {
            color: #00d4ff;
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #00d4ff;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 212, 255, 0.03);
            border: 2px solid #00d4ff;
            border-radius: 6px;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(0, 212, 255, 0.4);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d400ff;
            box-shadow: 
                inset 0 0 10px rgba(0, 212, 255, 0.1),
                0 0 20px rgba(212, 0, 255, 0.3),
                0 0 40px rgba(212, 0, 255, 0.2);
            background: rgba(212, 0, 255, 0.05);
        }

        .form-group input:valid {
            border-color: #00d4ff;
        }

        .form-group input:invalid:not(:placeholder-shown) {
            border-color: #ff0055;
            box-shadow: inset 0 0 10px rgba(255, 0, 85, 0.1), 0 0 20px rgba(255, 0, 85, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(212, 0, 255, 0.1));
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 0, 255, 0.3), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .submit-btn:hover {
            border-color: #d400ff;
            color: #d400ff;
            box-shadow: 
                0 0 30px rgba(212, 0, 255, 0.5),
                0 0 60px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(212, 0, 255, 0.2);
            transform: translateY(-2px);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 
                    0 0 20px rgba(0, 212, 255, 0.3),
                    inset 0 0 20px rgba(0, 212, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(0, 212, 255, 0.5),
                    inset 0 0 30px rgba(0, 212, 255, 0.15);
            }
        }

        .decorative-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #d400ff;
            opacity: 0.5;
        }

        .corner-top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-radius: 8px 0 0 0;
        }

        .corner-top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
            border-radius: 0 8px 0 0;
        }

        .corner-bottom-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 8px;
        }

        .corner-bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-radius: 0 0 8px 0;
        }

        /* ===== CYBERPUNK NAVIGATION BAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 0, 51, 0.95) 50%, rgba(10, 14, 39, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), inset 0 1px 0 rgba(212, 0, 255, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: bold;
            color: #00f5ff;
            text-shadow: 0 0 10px #00f5ff, 0 0 20px #a020f0;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .navbar-logo:hover {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 30px #00f5ff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: #00f5ff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 12px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #d400ff);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .nav-link:hover {
            color: #d400ff;
            text-shadow: 0 0 10px #d400ff, 0 0 20px #00f5ff;
        }

        .nav-link:hover::before {
            width: 100%;
        }

        .nav-link.active {
            color: #d400ff;
            text-shadow: 0 0 15px #d400ff, 0 0 25px #00f5ff;
            border-bottom: 2px solid #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.6) inset;
        }

        .nav-link.active::before {
            width: 100%;
            background: linear-gradient(90deg, #d400ff, #00f5ff);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #00f5ff;
            border-radius: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00f5ff;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ===== RESPONSIVE DESIGN (Mobile & Tablet) ===== */
        @media (max-width: 768px) {
            body {
                margin-top: 60px;
            }

            .navbar {
                height: 60px;
                padding: 0 20px;
            }

            .navbar-logo {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .hamburger {
                display: flex;
            }

            .nav-menu {
                position: absolute;
                left: 0;
                top: 60px;
                flex-direction: column;
                width: 100%;
                text-align: center;
                background: linear-gradient(180deg, rgba(10, 14, 39, 0.98) 0%, rgba(26, 0, 51, 0.98) 100%);
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                border-bottom: 2px solid #00f5ff;
                box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2);
            }

            .nav-menu.active {
                max-height: 300px;
            }

            .nav-link {
                width: 100%;
                padding: 18px 20px;
                border-bottom: 1px solid rgba(0, 245, 255, 0.2);
                font-size: 13px;
            }

            .nav-link::before {
                display: none;
            }

            .nav-link:hover {
                background: rgba(0, 245, 255, 0.1);
                border-left: 4px solid #d400ff;
                padding-left: 16px;
            }

            .nav-link.active {
                background: rgba(212, 0, 255, 0.2);
                border-left: 4px solid #d400ff;
                border-bottom: 1px solid #d400ff;
                padding-left: 16px;
            }

            .form-container {
                padding: 30px;
            }

            .email-display {
                font-size: 20px;
                padding: 15px 30px;
            }

            .form-title {
                font-size: 20px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .decorative-corner {
                width: 30px;
                height: 30px;
            }

            .neon-line {
                margin: 30px 0;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                margin-top: 55px;
            }

            .navbar {
                height: 55px;
                padding: 0 15px;
            }

            .navbar-logo {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .nav-link {
                font-size: 12px;
            }

            .nav-menu.active {
                max-height: 280px;
            }

            .container {
                max-width: 100%;
            }

            .email-section {
                margin-bottom: 40px;
            }

            .form-container {
                padding: 20px;
                border-radius: 8px;
            }

            .email-display {
                font-size: 16px;
                padding: 12px 20px;
            }

            .form-title {
                font-size: 18px;
                margin-bottom: 20px;
            }

            .form-group input,
            .form-group textarea {
                padding: 12px;
                font-size: 13px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- CYBERPUNK NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">INEZA</div>
        <ul class="nav-menu">
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="projects.html" class="nav-link">Projects</a></li>
            <li><a href="hobbies.html" class="nav-link">Hobbies</a></li>
            <li><a href="skills.html" class="nav-link">Skills</a></li>
            <li><a href="contacts.html" class="nav-link active">Contacts</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- CONTACTS CONTENT -->
    <div class="container">
        <div class="email-section">
            <span class="email-label">Direct Contact</span>
            <div class="email-display">ineza.ingrid31@ntare-louisenlund.org</div>
        </div>

        <div class="neon-line"></div>

        <div class="form-container">
            <div class="decorative-corner corner-top-left"></div>
            <div class="decorative-corner corner-top-right"></div>
            <div class="decorative-corner corner-bottom-left"></div>
            <div class="decorative-corner corner-bottom-right"></div>

            <h2 class="form-title">Get In Touch</h2>

            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Your name" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input 
                        type="text" 
                        id="subject" 
                        name="subject" 
                        placeholder="What's this about?" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea 
                        id="message" 
                        name="message" 
                        placeholder="Your message here..." 
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        // ===== NAVBAR FUNCTIONALITY =====
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const navLinks = document.querySelectorAll('.nav-link');

        // Toggle hamburger menu
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Close menu when a link is clicked
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // Set active link based on current page
        function setActivePage() {
            const currentPage = window.location.pathname.split('/').pop() || 'about.html';
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                
                if (href === currentPage || (currentPage === '' && href === 'about.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', setActivePage);
        window.addEventListener('popstate', setActivePage);

        // ===== CONTACT FORM FUNCTIONALITY =====
        const contactForm = document.getElementById('contactForm');

        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            if (name && email && subject && message) {
                alert('Thank you for your message! I will get back to you soon.');
                contactForm.reset();
            }
        });

        document.getElementById('email').addEventListener('click', function() {
            navigator.clipboard.writeText('ineza.ingrid31@ntare-louisenlund.org');
            alert('Email copied to clipboard!');
        });
    </script>
</body>
</html>
